name: Kairo
options:
  bundleIdPrefix: me.neima
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
targets:
  Kairo:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.neima.kairo
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: App/Kairo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.neima.kairo
    dependencies:
      - target: KairoWidget
        embed: true
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: "YES"
  KairoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Kairo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.neima.kairo.uitests
        TEST_TARGET_NAME: Kairo
  KairoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.neima.kairo.widgets
        INFOPLIST_FILE: Widget/Info.plist
        SKIP_INSTALL: "YES"
    entitlements:
      path: Widget/KairoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.neima.kairo
schemes:
  Kairo:
    build:
      targets:
        Kairo: all
        KairoUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KairoUITests

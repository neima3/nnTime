# Kairo CI — Phase 1B.
# Runs on every push and PR. Lint, typecheck, test (with an ephemeral Postgres
# service container for DB integration tests), and build.
# The contract-parity test (ADR-002 drift gate) and temporal matrix run as part
# of `pnpm test`; Playwright smoke is added in a later subphase.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # Postgres 16+ matches the Coolify-managed target.
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kairo
          POSTGRES_PASSWORD: kairo
          POSTGRES_DB: kairo_test
        ports:
          - 5432:5432
        # Wait until the server accepts connections before continuing.
        options: >-
          --health-cmd "pg_isready -U kairo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The CI service container listens on localhost:5432 (runner network).
      TEST_DATABASE_URL: postgresql://kairo:kairo@localhost:5432/kairo_test
      DATABASE_URL: postgresql://kairo:kairo@localhost:5432/kairo_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + DB integration + contract parity)
        run: pnpm test

      - name: Build
        run: pnpm build
